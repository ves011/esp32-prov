<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<style>
body {font-family: Arial;}
table.alternate tr:nth-child(odd) {background-color:  #ffffff;}
table.alternate tr:nth-child(even) {background-color: #c0c0c0;}
button {width:120px}
html.wait, html.wait * { cursor: wait !important; }
</style>
<script>
var c_connected = false;
var websocket  = null;
var xhttp;
// set boot partition 			- client2server
//								- response: refresh page
const SETBOOT           = "setBoot";

//upload partition image status	- server2client 
// generated by flashing_post_handler()
const USTATUS = "ustatus";

// dump partition image status	-server2client
// generated by dump_get_handler()
const DSTATUS 	        = "dstatus";	

/*
ERASE partition flow
client to server 	ERASE\1query\1\partition name\1
server to client 	ERASESTATUS\1error\error message\1
					ERASESTATUS\1confirm\1part name\1
client to server 	ERASE\1confirmok\1part name\1
server to client 	ERASESTATUS\1progress\1progress message\1
*/

// erase partition				- client2server
//								- response ERASESTATUS
const ERASE		        = "erase";
const ERASESTATUS	    = "erasestatus";

// create NVS key/value pair	- client2server
// responds with ESP_OK/ESP_FAIL
const CREATEKEY		    = "createkey";

/*
update key flow
1. client 2 server		UPD_REQUEST\1keyID\1length\1#chunks\1
2. server 2 client		SEND_VAL\1keyID
3. client 2 server		UPDATE_VAL\1keyID\1#chunk\1length\1
	for NVS_TYPE_STR or BLOB step3 repeats util entire key value is sent
4.server 2 client		UPDATE_KEY\1keyID\1keyName\1error code\1error string
*/
const UPD_REQUEST		= "update req";
const SEND_VAL		    = "send val";
const UPDATE_VAL		= "update val";
const UPDATE_KEY		= "update key";

/*
delete key flow
client 2 server			DELETE_NS\1namespaceName\1
						DELETE_KEY\1keyID\1
server 2 client			DELETE_KEY_RESP\1key|namespace name\1error code\1error string\1
*/
const DELETE_NS		    = "delete ns";
const DELETE_KEY		= "delete key";
const DELETE_KEY_RESP	= "delete key resp";

//server 2 client		DUMP_KEY\1keyID\1keyName\1error code\1error string\1
const DUMP_KEY		    = "dump key";

function setBoot()
	{
	var pName = document.getElementById("parts").value;
	ws_send("setBoot" + '\1' + pName + '\1');
	}
function erase()
	{
	var pName = document.getElementById("parts").value;
	ws_send(ERASE + '\1query\1' + pName + '\1');
	}
function update(fName) 
	{
	if(fName == "reboot")
		{
		document.getElementById(fName).method = "POST";
		document.getElementById(fName)[0].value = "1";
		document.getElementById(fName).action = "/a";
		}
	}
function ws_send(msg)
	{
	if(websocket.readyState == WebSocket.OPEN)
		websocket.send(msg);
	else
		alert("not connected to websocket server");
	}
function ws_receive(msg)
	{
	console.log('RECEIVED:', msg.data);
	var params = msg.data.split('\x01');
	if(params[0] == "setBoot" && params.length == 3)
		{
		//setBoot\0x01resutlt(0|1)\0x01partName\0x01
		if(params[1] != "ESP_OK")
			alert("Cannot set boot flag to " + params[2] + "\n" + params[1]);
		}
	else if(params[0] == "refresh")
		{
		if(params.length == 3)
			loc = window.location.origin + "/?" + params[1] + "=" + params[2];
		else
			loc = window.location.origin;
		window.location = loc;
		}
	else if(params[0] == "ustatus")
		{
		if(params[1] == "progress")
			document.getElementById("ustatus").innerHTML = "flashing... " + params[2];
		else if(params[1] == "error")
			{
			if(upload_inp == 1)
				xhttp.abort();
			}
		}
	else if(params[0] == "dstatus")
		{
		//document.getElementById("dump").style.cursor = "default";
		//document.body.style.cursor = "default";
		document.querySelector("html").classList.remove("wait");
		if(params[1] == "progress")
			alert(params[2]);
		}
	else if(params[0] == "erasestatus")
		{
		if(params[1] == "error")
			alert(params[2]);
		else if(params[1] == "confirm")
			{
			//var pName = document.getElementById("parts").value;
			if(confirm('Erasing ' + params[2] + ' all data will be lost!\nPress "OK" to continue') == true)
				ws_send("erase" + '\1confirmok\1' + params[2] + '\1');
			}
		else if(params[1] == "progress")
			alert(params[2]);
		}
	}
/*
function setpath() 
	{
    var default_path = document.getElementById("newfile").files[0].name;
    //document.getElementById("filepath").value = default_path;
	}
*/
function upload() 
	{
	//var filePath = document.getElementById("newfile").files[0].name;
    var upload_path = "/upload/" + document.getElementById("parts").value; //filePath;
    var fileInput = document.getElementById("newfile").files;
    var file = fileInput[0];

	xhttp = new XMLHttpRequest();
	xhttp.onreadystatechange = function() 
		{
		if (xhttp.readyState == 4) 
			{
			upload_inp = 0;
			if (xhttp.status == 200) 
				window.location.href = location.origin + "?tab=part";
			else if (xhttp.status == 303) 
				alert(xhttp.responseText);
			else if (xhttp.status == 302) 
				{ 
				xhttp.open("POST", upload_path, true);
				xhttp.send(file);
				}
			else if (xhttp.status == 0) 
				{
				alert("Server closed the connection abruptly!");
				window.location.href = location.origin + "?tab=part";
				} 
			else 
				{
				alert(xhttp.status + " Error!\n" + xhttp.responseText);
				window.location.href = location.origin + "?tab=part";
				}
			}
		};
	var u = upload_path  + ".test";
	xhttp.open("POST", upload_path + "." + file.size, true);
	xhttp.send(null);
	}
function dump()
	{
	// Create a link and set the URL using `createObjectURL`
	//document.getElementById("dump").style.cursor = "wait";
	//document.body.style.cursor = "wait";
	//document.querySelector("html").classList.add("wait");
	var name = document.getElementById("parts").value;
	//const file = new File([""], name + ".bin");
  	const link = document.createElement("a");
	link.style.display = "none";
	link.href = location.origin + "/download/" + name; 
	//link.href = URL.createObjectURL(file);

	link.download = name + ".bin";

  // It needs to be added to the DOM so it can be clicked
  	document.body.appendChild(link);
  	link.click();

	// To make this work on Firefox we need to wait
	// a little while before removing it.
	setTimeout(() => {
    	URL.revokeObjectURL(link.href);
    	link.parentNode.removeChild(link);
  		}, 100);
	}
function pageload()
    {
    const wsUri = window.location.origin + "/ws";
	websocket = new WebSocket(wsUri);
	websocket.addEventListener("open", () => {console.log("CONNECTED"); c_connected = true;});
	websocket.addEventListener("close", (event) => {console.log("DISCONNECTED: " + event.data); c_connected = false;});
	websocket.onmessage = (msg) => {ws_receive(msg);};
	}
</script>
</head>

</div>
